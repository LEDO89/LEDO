services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ledo
      POSTGRES_PASSWORD: ledo
      POSTGRES_DB: ledo_mvp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  fuseki:
    image: stain/jena-fuseki:latest
    environment:
      ADMIN_PASSWORD: ledo
      FUSEKI_DATASET_1: ledo
    ports:
      - "3030:3030"
    volumes:
      - fuseki_data:/fuseki

  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "--addr=0.0.0.0:8181", "/policies"]
    ports:
      - "8181:8181"
    volumes:
      - ./backend/policy_rules.rego:/policies/policy_rules.rego:ro

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"

  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install -r requirements.txt && uvicorn backend.app:app --host 0.0.0.0 --port 8765"
    ports:
      - "8765:8765"
    depends_on:
      - postgres
      - redis
      - fuseki
      - opa
      - redpanda

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8765
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  fuseki_data:

